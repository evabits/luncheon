    <rect x="15" y="85" width="130" height="12" rx="6" fill="url(#leaf)"/>
    <rect x="15" y="100" width="130" height="20" rx="10"
          fill="url(#bun)" stroke="#C98024" stroke-width="3"/>
  </g>
