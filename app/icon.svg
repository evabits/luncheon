    <path d="M15 55c0-25 20-40 45-40h40c25 0 45 15 45 40v10H15z"
          fill="url(#bun)" stroke="#C98024" stroke-width="3"/>
    <path d="M18 75c10-8 20-8 30 0s20 8 30 0s20-8 30 0s20 8 30 0v12H18z"
